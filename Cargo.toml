[package]
name = "cctp-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
alloy = { version = "2.0.5", features = ["signer-trezor"] }
alloy-chains = "0.2"
clap = { version = "4.5", features = ["derive", "env"] }
cctp-rs = { path = "../cctp-rs" }
eyre = "0.6"
tokio = { version = "1.52", features = ["macros", "rt-multi-thread"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2.5"
